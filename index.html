<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tools</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f6f8;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .card-desc {
            font-size: 14px;
            color: #666;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>My Tools</h1>

    <div class="grid">

        <!-- Electricity Bill Generator -->
        <a href="electricity-bill/index.html" class="card">
            <div class="card-title">Electricity Bill Generator</div>
            <div class="card-desc">
                Generate tenant electricity bills with sub-meter calculations.
            </div>
        </a>

        <!-- Rent Invoice Generator -->
        <a href="rent-invoice/index.html" class="card">
            <div class="card-title">Rent Invoice Generator</div>
            <div class="card-desc">
                Create professional rent invoices with multiple line items.
            </div>
        </a>

        <!-- Add More Apps Below -->
        <!-- Example:
        <a href="app-folder/index.html" class="card">
            <div class="card-title">App Name</div>
            <div class="card-desc">Short description</div>
        </a>
        -->

    </div>

    <footer>
        © 2026
    </footer>
</div>

</body>
</html>
